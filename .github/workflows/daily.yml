# Dzienny brief — ma być GOTOWY przed 8:00 Europe/Warsaw.
# Cron 04:30 UTC = 06:30 latem (CEST) / 05:30 zimą (CET). Start z zapasem, bo:
#  - GitHub Actions bywa opóźniony 5-15 min,
#  - pełny obieg (analiza + fact-check web search + deploy z retry) trwa ~10-20 min.
# Dzięki temu w obu porach roku brief jest gotowy ok. 7:00, na spokojnie przed 8:00.
# UWAGA (2026-07-04): sonda test-transcript pokazała blokadę auto-napisów na IP Actions
# (1/3). Czy brief będzie miał treść, potwierdzi pierwszy poranny run — jeśli pusty,
# przechodzimy na fix (cookies na Actions, żeby utrzymać gwarancję godziny).
name: daily

on:
  schedule:
    - cron: "30 4 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily
  cancel-in-progress: false

jobs:
  brief:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Zależności
        run: pip install -r requirements.txt

      - name: Pełny obieg
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SITE_URL: ${{ secrets.SITE_URL }}
          WEBSHARE_PROXY_USERNAME: ${{ secrets.WEBSHARE_PROXY_USERNAME }}
          WEBSHARE_PROXY_PASSWORD: ${{ secrets.WEBSHARE_PROXY_PASSWORD }}
        run: python -m src.run_daily

      # Fallback hostingu: konto ma blokadę deployów GitHub Pages (stan 2026-07-03).
      # Krok aktywuje się sam po dodaniu sekretów NETLIFY_AUTH_TOKEN + NETLIFY_SITE_ID
      # (wtedy ustaw też SITE_URL na adres netlify, żeby Telegram linkował dobrze).
      - name: Deploy na Netlify (opcjonalny fallback)
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          if [ -n "$NETLIFY_AUTH_TOKEN" ] && [ -n "$NETLIFY_SITE_ID" ]; then
            npx --yes netlify-cli@17 deploy --prod --dir docs --auth "$NETLIFY_AUTH_TOKEN" --site "$NETLIFY_SITE_ID"
          else
            echo "Netlify pominięty (brak sekretów) — liczymy na GitHub Pages"
          fi

      - name: Commit bazy i strony
        run: |
          git config user.name "yt-brief bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/brief.db docs/
          git diff --cached --quiet && echo "brak zmian" || {
            git commit -m "brief $(date -u +%F)"
            git push
          }
