# Dzienny brief — ma być GOTOWY przed 8:00 Europe/Warsaw.
# Cron 01:30 UTC, bo GitHub na darmowym planie opóźnia scheduled runs o 3-4h
# (zmierzone: cron 04:30 odpalał się 07:03-08:46 UTC => brief po 9:00 polskiego).
# Start 01:30 + poślizg do ~4.5h + obieg ~15 min => gotowy przed 06:00 UTC = 08:00 CEST.
name: daily

on:
  schedule:
    - cron: "30 1 * * *"
  workflow_dispatch:
    inputs:
      lookback_days:
        description: "Ile dni wstecz brać filmy (domyślnie 1 = ostatnie 24h)"
        required: false
        default: "1"

permissions:
  contents: write
  pages: write
  id-token: write
  models: read  # GitHub Models (darmowe GPT-4.1 do tematów i draftów)

concurrency:
  group: daily
  cancel-in-progress: false

jobs:
  brief:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Zależności
        run: pip install -r requirements.txt

      - name: Pełny obieg
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_MODELS_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          YT_BRIEF_LOOKBACK_DAYS: ${{ github.event.inputs.lookback_days || '1' }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SITE_URL: ${{ secrets.SITE_URL }}
          WEBSHARE_PROXY_USERNAME: ${{ secrets.WEBSHARE_PROXY_USERNAME }}
          WEBSHARE_PROXY_PASSWORD: ${{ secrets.WEBSHARE_PROXY_PASSWORD }}
        run: python -m src.run_daily

      # Publikacja na GitHub Pages W TYM SAMYM runie. Kluczowe: bot commituje
      # tokenem GITHUB_TOKEN, a push takim tokenem NIE wyzwala workflowu pages.yml
      # (ochrona przed pętlą). Bez tego kroku brief by się generował, ale nigdy
      # sam nie publikował. Retry, bo Pages bywa flaky ("try again later").
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - id: pages1
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - if: steps.pages1.outcome == 'failure'
        run: echo "deploy próba 1 padła — czekam 90s" && sleep 90
      - id: pages2
        if: steps.pages1.outcome == 'failure'
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - if: steps.pages1.outcome == 'failure' && steps.pages2.outcome == 'failure'
        run: echo "deploy próba 2 padła — czekam 180s" && sleep 180
      - id: pages3
        if: steps.pages1.outcome == 'failure' && steps.pages2.outcome == 'failure'
        uses: actions/deploy-pages@v4

      # Fallback hostingu: konto ma blokadę deployów GitHub Pages (stan 2026-07-03).
      # Krok aktywuje się sam po dodaniu sekretów NETLIFY_AUTH_TOKEN + NETLIFY_SITE_ID
      # (wtedy ustaw też SITE_URL na adres netlify, żeby Telegram linkował dobrze).
      - name: Deploy na Netlify (opcjonalny fallback)
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          if [ -n "$NETLIFY_AUTH_TOKEN" ] && [ -n "$NETLIFY_SITE_ID" ]; then
            npx --yes netlify-cli@17 deploy --prod --dir docs --auth "$NETLIFY_AUTH_TOKEN" --site "$NETLIFY_SITE_ID"
          else
            echo "Netlify pominięty (brak sekretów) — liczymy na GitHub Pages"
          fi

      - name: Commit bazy i strony
        run: |
          git config user.name "yt-brief bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/brief.db docs/
          git diff --cached --quiet && echo "brak zmian" || {
            git commit -m "brief $(date -u +%F)"
            git push
          }
