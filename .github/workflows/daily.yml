# Dzienny brief: cron 05:00 UTC = 07:00 latem / 06:00 zimą (Europe/Warsaw).
# Cron w Actions chodzi w UTC i nie zna DST — jeśli zimowa 06:00 przeszkadza,
# zmień na "0 6 * * *" w październiku.
# UWAGA (2026-07-04): sonda test-transcript pokazała, że IP Actions blokuje auto-napisy
# (1/3). Zostawiamy cron na GitHubie i sprawdzamy realny wynik jutro — jeśli briefy będą
# puste/szczątkowe, wtedy rozważymy przeniesienie ingestu lokalnie.
name: daily

on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily
  cancel-in-progress: false

jobs:
  brief:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Zależności
        run: pip install -r requirements.txt

      - name: Pełny obieg
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SITE_URL: ${{ secrets.SITE_URL }}
        run: python -m src.run_daily

      # Fallback hostingu: konto ma blokadę deployów GitHub Pages (stan 2026-07-03).
      # Krok aktywuje się sam po dodaniu sekretów NETLIFY_AUTH_TOKEN + NETLIFY_SITE_ID
      # (wtedy ustaw też SITE_URL na adres netlify, żeby Telegram linkował dobrze).
      - name: Deploy na Netlify (opcjonalny fallback)
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          if [ -n "$NETLIFY_AUTH_TOKEN" ] && [ -n "$NETLIFY_SITE_ID" ]; then
            npx --yes netlify-cli@17 deploy --prod --dir docs --auth "$NETLIFY_AUTH_TOKEN" --site "$NETLIFY_SITE_ID"
          else
            echo "Netlify pominięty (brak sekretów) — liczymy na GitHub Pages"
          fi

      - name: Commit bazy i strony
        run: |
          git config user.name "yt-brief bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/brief.db docs/
          git diff --cached --quiet && echo "brak zmian" || {
            git commit -m "brief $(date -u +%F)"
            git push
          }
