# Sonda: czy dany model Gemini ma darmową pulę na tym koncie (limit 0 vs działa).
# Jedno malutkie wywołanie tekstowe. Uruchamiać ręcznie.
name: test-model

on:
  workflow_dispatch:
    inputs:
      model:
        description: "Model do sprawdzenia"
        required: false
        default: "gemini-2.5-pro"

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install "google-genai>=1.0"
      - name: Jedno wywołanie
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          MODEL: ${{ github.event.inputs.model }}
        run: |
          python - <<'PY'
          import os
          from google import genai
          client = genai.Client(api_key=os.environ["GEMINI_API_KEY"])
          m = os.environ["MODEL"]
          try:
              r = client.models.generate_content(model=m, contents="Odpowiedz jednym słowem: ping")
              print(f"OK model={m} odpowiedź={r.text!r} tokeny_we={r.usage_metadata.prompt_token_count}")
          except Exception as e:
              print(f"BŁĄD model={m}: {type(e).__name__}")
              print(str(e)[:600])
          PY
