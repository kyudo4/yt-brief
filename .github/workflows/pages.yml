# Publikacja docs/ na GitHub Pages przez Actions (source: GitHub Actions).
# Odpala się po każdym pushu zmieniającym docs/ — także po commitach bota z daily.yml.
name: pages

on:
  push:
    branches: [main]
    paths: ["docs/**"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      # Deploy z ponawianiem: Pages bywa flaky ("Deployment failed, try again later")
      # przy przejściowym limicie deploymentów. 3 próby z narastającym odstępem.
      - id: deploy1
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - if: steps.deploy1.outcome == 'failure'
        run: echo "deploy próba 1 padła — czekam 90s i ponawiam" && sleep 90
      - id: deploy2
        if: steps.deploy1.outcome == 'failure'
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - if: steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        run: echo "deploy próba 2 padła — czekam 180s i ponawiam" && sleep 180
      - id: deploy3
        if: steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        uses: actions/deploy-pages@v4
